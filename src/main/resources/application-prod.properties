spring.application.name=parser-service
server.port=${PORT:10000}
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${AIVEN_PG_HOST}:${AIVEN_PG_PORT}/${AIVEN_PG_DATABASE}?sslmode=require
spring.datasource.username=${AIVEN_PG_USER}
spring.datasource.password=${AIVEN_PG_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0

spring.jpa.hibernate.ddl-auto=update

spring.kafka.bootstrap-servers=${AIVEN_KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=parser-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.swap.parserservice.dto.SmsEventDto
spring.kafka.consumer.properties.spring.json.trusted.packages=com.swap.parserservice.dto
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${AIVEN_KAFKA_USERNAME}" password="${AIVEN_KAFKA_PASSWORD}";
spring.kafka.properties.ssl.truststore.location=/app/client.truststore.jks
spring.kafka.properties.ssl.truststore.password=changeit
spring.kafka.properties.ssl.truststore.type=JKS

mistral.api.key=${MISTRAL_API_KEY}
mistral.model=${MISTRAL_MODEL:mistral-small-latest}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always